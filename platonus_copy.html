    { q:"Какие ошибки чаще всего допускаются при установке СЗИ?", a:"Установить СЗИ и настроить правильно — разные вещи. Типичные ошибки: Настройки по умолчанию — оставили дефолтные пароли, дефолтные правила. Атакующие знают настройки по умолчанию наизусть. Слишком мягкие политики — чтобы 'не мешать работе' разрешили всё подряд. Защита номинальная. Отсутствие тестирования — установили, но не проверили работает ли. Правило в фаерволе может быть неверным. Нет интеграции — СЗИ работает само по себе, события не попадают в SIEM — картина неполная. Нет документации — кто настраивал, какие правила, почему именно так? Через год никто не знает. Слишком много исключений — добавляли исключения 'временно', они стали постоянными и создали бреши. Не обновляют — установили и забыли. Уязвимости в самом СЗИ растут. Не учат пользователей — самый крутой антивирус не поможет, если пользователь сам выключит его." },
    { q:"Какие новые технологии используются для защиты информации?", a:"Безопасность развивается вместе с угрозами. Новые технологии: ИИ и ML в безопасности — обнаружение аномалий, поведенческий анализ, автоматизация реагирования (SOAR). Zero Trust Architecture — микросегментация, постоянная верификация, принцип 'не доверяй никому'. SASE (Secure Access Service Edge) — объединение сетевых и облачных функций безопасности в одном облачном сервисе. Постквантовая криптография — новые алгоритмы, устойчивые к квантовым компьютерам (CRYSTALS-Kyber, Dilithium). SOAR (Security Orchestration, Automation & Response) — автоматическое реагирование на инциденты без ручного вмешательства. Deception Technology (Ловушки) — продвинутые honeypot-системы, создающие ложную инфраструктуру для атакующих. Blockchain для аудита — неизменяемые журналы событий. Confidential Computing — шифрование даже во время обработки данных." }
  ]},
  { n:30, qs:[
    { q:"Почему анализ архитектуры ИС важен для обеспечения ИБ организации?", a:"Нельзя защитить то, что не понимаешь. Анализ архитектуры — фундамент всей безопасности. Почему важен: Понимание, что защищать — где хранятся данные, как они передаются, какие компоненты критичны. Выявление слабых мест — только понимая архитектуру, можно найти уязвимые места: открытые порты, незащищённые API, прямой доступ к БД. Правильное размещение СЗИ — фаервол нужно поставить именно там, где он реально перехватит трафик. Оценка поверхности атаки — чем сложнее система, тем больше точек входа для атакующего. Разработка модели угроз — STRIDE, PASTA — без карты архитектуры не построишь. Security by Design — лучше встроить защиту при проектировании, чем переделывать потом. Планирование непрерывности — какие компоненты критичны для работоспособности?" },
    { q:"В чём преимущества и недостатки парольной аутентификации?", a:"Пароли — самый старый метод аутентификации. До сих пор везде. Преимущества: Простота — не нужно специального оборудования. Дёшево — нулевая стоимость внедрения. Универсальность — работает на любом устройстве и платформе. Легко сменить — если скомпрометирован, меняешь за секунду. Знакомо всем — не нужно обучение. Недостатки: Утечки баз данных — миллиарды паролей уже в даркнете. Слабые пароли — '123456' до сих пор в топе. Переиспользование — один пароль на 20 сайтах. Фишинг — человека легко обмануть и он сам введёт пароль. Подбор (брутфорс) — автоматический перебор. Забывают — 'Забыли пароль?' — самая нажимаемая кнопка. Вывод: пароли нужно дополнять вторым фактором (MFA), а не заменять полностью." },
    { q:"Назовите основные виды средств защиты информации. Роль цифровых сертификатов в TLS.", a:"Основные виды СЗИ: Технические (аппаратные) — HSM, токены, смарт-карты, биометрические считыватели, аппаратные NGFW. Программные — антивирусы, SIEM, DLP, IDS/IPS, VPN-клиенты, шифровальщики. Программно-аппаратные — межсетевые экраны, VPN-шлюзы, IPS-устройства. Криптографические (СКЗИ) — средства шифрования и электронной подписи. Организационные — политики, инструкции, обучение, аудиты. Физические — СКУД, видеонаблюдение, сейфы, замки серверных. Цифровые сертификаты в TLS: Сертификат X.509 — электронный 'паспорт' сервера. Подписан доверенным Удостоверяющим Центром (CA: DigiCert, Let's Encrypt). Содержит: публичный ключ сервера, кому выдан (домен), срок действия, подпись CA. Зачем нужен: без сертификата при HTTPS злоумышленник мог бы подсунуть свой ключ ('человек посередине'). Сертификат доказывает: 'этот публичный ключ — реально от google.com, а не от хакера'." }
  ]}
];

const DIFF_MAP = DIFF;
let allCards = [];
let filtered = [];
let current = 0;
let learned = new Set(JSON.parse(localStorage.getItem('pm08_learned')||'[]'));
let selectedTicket = 0;
let diffFilter = 'all';

function buildCards(){
  allCards = [];
  TICKETS.forEach(t => t.qs.forEach((q,i) => {
    allCards.push({ ticket: t.n, qnum: i+1, q: q.q, a: q.a, diff: DIFF[t.n] });
  }));
}

function applyFilter(){
  filtered = allCards.filter(c => {
    const ticketOk = selectedTicket === 0 || c.ticket === selectedTicket;
    const diffOk   = diffFilter === 'all' || c.diff === diffFilter;
    return ticketOk && diffOk;
  });
  current = 0;
  renderCard();
}

function renderCard(){
  if(!filtered.length){
    document.getElementById('flashcard').className = 'flashcard';
    document.getElementById('cQuestion').textContent = 'Нет карточек для выбранного фильтра.';
    document.getElementById('cAnswer').textContent = '';
    document.getElementById('cTicket').textContent = '';
    document.getElementById('cBadge').textContent = '';
    document.getElementById('progressLabel').textContent = '0 карточек';
    document.getElementById('progressFill').style.width = '0%';
    return;
  }
  const c = filtered[current];
  const d = c.diff;
  const fc = document.getElementById('flashcard');
  fc.classList.remove('flipped','cf-easy','cf-med','cf-hard');
  fc.classList.add(CF_CLASS[d]);
  document.getElementById('cTicket').textContent  = `БИЛЕТ №${c.ticket} · Вопрос ${c.qnum}/3`;
  document.getElementById('cTicketB').textContent = `БИЛЕТ №${c.ticket} · Вопрос ${c.qnum}/3`;
  document.getElementById('cBadge').textContent   = DIFF_LABEL[d];
  document.getElementById('cBadge').className     = `diff-badge ${DIFF_CLASS[d]}`;
  document.getElementById('cBadgeB').textContent  = DIFF_LABEL[d];
  document.getElementById('cBadgeB').className    = `diff-badge ${DIFF_CLASS[d]}`;
  document.getElementById('cQuestion').textContent = c.q;
  document.getElementById('cAnswer').textContent   = c.a;
  const pct = ((current+1)/filtered.length*100).toFixed(0);
  const pf  = document.getElementById('progressFill');
  pf.style.width = pct+'%';
  pf.className = 'progress-fill ' + PF_CLASS[d];
  document.getElementById('progressLabel').textContent = `${current+1} / ${filtered.length} карточек · ✓ Знаю: ${learned.size}`;
}

function flipCard(){ document.getElementById('flashcard').classList.toggle('flipped'); }
function nextCard(){ current=(current+1)%filtered.length; renderCard(); }
function prevCard(){ current=(current-1+filtered.length)%filtered.length; renderCard(); }
function markLearned(){
  const c=filtered[current];
  learned.add(c.ticket+'-'+c.qnum);
  localStorage.setItem('pm08_learned',JSON.stringify([...learned]));
  nextCard();
}
function shuffle(){ filtered.sort(()=>Math.random()-.5); current=0; renderCard(); }
function resetLearned(){ learned.clear(); localStorage.setItem('pm08_learned','[]'); renderCard(); }

function setDiffFilter(d, btn){
  diffFilter = d;
  document.querySelectorAll('.diff-filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  selectedTicket = 0;
  document.querySelectorAll('.ticket-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.ticket-btn.tb-all').classList.add('active');
  applyFilter();
}

function buildTicketFilter(){
  const wrap = document.getElementById('ticketFilter');
  wrap.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'ticket-btn tb-all active';
  all.textContent = 'Все';
  all.onclick = () => {
    selectedTicket = 0;
    document.querySelectorAll('.ticket-btn').forEach(b=>b.classList.remove('active'));
    all.classList.add('active');
    applyFilter();
  };
  wrap.appendChild(all);
  TICKETS.forEach(t => {
    const btn = document.createElement('button');
    btn.className = `ticket-btn ${TB_CLASS[DIFF[t.n]]}`;
    btn.textContent = '№'+t.n;
    btn.onclick = () => {
      selectedTicket = t.n;
      diffFilter = 'all';
      document.querySelectorAll('.diff-filter-btn').forEach(b=>b.classList.remove('active'));
      document.querySelector('.df-all').classList.add('active');
      document.querySelectorAll('.ticket-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      applyFilter();
    };
    wrap.appendChild(btn);
  });
}

// QUIZ
let quizQuestions=[], quizAnswered=0, quizCorrect=0;

function buildQuiz(){
  quizQuestions = [];
  TICKETS.forEach(t => {
    const qi = Math.floor(Math.random()*3);
    const card = { ticket: t.n, diff: DIFF[t.n], ...t.qs[qi] };
    const others = allCards.filter(c => c.ticket !== t.n);
    const wrongs = others.sort(()=>Math.random()-.5).slice(0,3);
    const opts = [card.a, ...wrongs.map(o=>o.a)].sort(()=>Math.random()-.5);
    quizQuestions.push({ ticket: t.n, diff: DIFF[t.n], q: card.q, correct: card.a, opts });
  });
  quizQuestions.sort(()=>Math.random()-.5);
  quizAnswered=0; quizCorrect=0;
  renderQuiz();
}

function renderQuiz(){
  const c = document.getElementById('quizContent');
  if(quizAnswered===quizQuestions.length && quizQuestions.length>0){
    const pct = Math.round(quizCorrect/quizQuestions.length*100);
    c.innerHTML=`<div class="results">
      <h2>Тест завершён! 🎉</h2>
      <div class="score-big">${quizCorrect}/${quizQuestions.length}</div>
      <div style="font-size:1.1rem;color:var(--muted);margin:.5rem 0">${pct}% правильных ответов</div>
      <p>${pct>=90?'🏆 Отлично! Вы готовы к экзамену!':pct>=67?'👍 Хорошо! Повторите слабые места.':'📚 Стоит ещё поработать с карточками.'}</p>
      <button class="btn" onclick="buildQuiz()">🔄 Новый тест</button>
    </div>`;
    return;
  }
  let html=`<div class="quiz-header">
    <div><h2 style="font-size:1.2rem">Проверка знаний</h2>
    <div style="color:var(--muted);font-size:.82rem">30 вопросов — по одному из каждого билета, случайный порядок</div></div>
    <div style="font-size:1rem;font-weight:700;color:var(--accent)">✓ ${quizCorrect} правильно из ${quizAnswered}</div>
    <button class="btn secondary" onclick="buildQuiz()">🔄 Новый тест</button>
  </div>`;
  quizQuestions.forEach((qq,i)=>{
    const d = qq.diff;
    const answered = qq._answered;
    html+=`<div class="quiz-q ql-${d}" id="qq${i}">
      <div class="quiz-top">
        <span class="quiz-ticket-label">БИЛЕТ №${qq.ticket}</span>
        <span class="diff-badge ${DIFF_CLASS[d]}">${DIFF_LABEL[d]}</span>
      </div>
      <div class="quiz-qtext">${i+1}. ${qq.q}</div>
      <div class="quiz-opts">`;
    qq.opts.forEach((opt,oi)=>{
      let cls='';
      if(answered){ cls=(opt===qq.correct?'correct':(opt===qq._chosen?'wrong':''))+' disabled'; }
      const short=opt.length>180?opt.substring(0,180)+'…':opt;
      html+=`<button class="quiz-opt ${cls}" onclick="answerQuiz(${i},${oi})">${short}</button>`;
    });
    html+=`</div>
      <div class="quiz-explanation ${answered?'show':''}">
        ${answered?`<strong>✅ Правильный ответ:</strong> ${qq.correct.substring(0,350)}${qq.correct.length>350?'…':''}`:''}</div>
    </div>`;
  });
  c.innerHTML = html;
}

function answerQuiz(qi, oi){
  const qq = quizQuestions[qi];
  if(qq._answered) return;
  qq._chosen = qq.opts[oi];
  qq._answered = true;
  if(qq._chosen === qq.correct) quizCorrect++;
  quizAnswered++;
  renderQuiz();
  setTimeout(()=>{ const el=document.getElementById('qq'+qi); if(el) el.scrollIntoView({behavior:'smooth',block:'center'}); },80);
}

// OVERVIEW
function buildOverview(){
  const counts = { easy:0, med:0, hard:0 };
  TICKETS.forEach(t => counts[DIFF[t.n]]++);
  document.getElementById('statRow').innerHTML=`
    <div class="stat-box"><div class="stat-num" style="color:var(--easy)">${counts.easy}</div><div class="stat-label">🟢 Простых билетов</div></div>
    <div class="stat-box"><div class="stat-num" style="color:var(--med)">${counts.med}</div><div class="stat-label">🟡 Средних билетов</div></div>
    <div class="stat-box"><div class="stat-num" style="color:var(--hard)">${counts.hard}</div><div class="stat-label">🔴 Сложных билетов</div></div>
    <div class="stat-box"><div class="stat-num" style="color:var(--accent)">90</div><div class="stat-label">Вопросов всего</div></div>`;
  const g = document.getElementById('overviewGrid');
  g.innerHTML = '';
  TICKETS.forEach(t => {
    const d = DIFF[t.n];
    const card = document.createElement('div');
    card.className = `ov-card ov-${d}`;
    card.innerHTML=`<h3>
      <span>Билет №${t.n}</span>
      <span class="diff-badge ${DIFF_CLASS[d]}">${DIFF_LABEL[d]}</span>
    </h3>
    <ul>${t.qs.map((q,i)=>`<li>${i+1}. ${q.q}</li>`).join('')}</ul>`;
    g.appendChild(card);
  });
}

function showPage(id, btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(btn) btn.classList.add('active');
  if(id==='quiz' && !quizQuestions.length) buildQuiz();
}

buildCards();
buildTicketFilter();
applyFilter();
buildOverview();
</script>
